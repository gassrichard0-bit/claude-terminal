<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mac Terminal</title>

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claude">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1b26">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231a1b26'/%3E%3Ctext x='90' y='118' font-family='-apple-system,sans-serif' font-size='80' font-weight='800' text-anchor='middle' fill='%23bb9af7'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">

<!-- xterm.js -->
<link rel="stylesheet" href="/xterm/xterm.min.css">
<script src="/xterm/xterm.min.js"></script>
<script src="/xterm/xterm-addon-fit.min.js"></script>
<script src="/xterm/xterm-addon-web-links.min.js"></script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1b26;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .topbar {
    display: flex;
    align-items: center;
    padding: 6px 14px;
    background: #24283b;
    border-bottom: 1px solid #1f2335;
    min-height: 38px;
    flex-shrink: 0;
    padding-top: env(safe-area-inset-top, 6px);
  }
  .topbar .logo { font-size: 12px; font-weight: 700; color: #bb9af7; }
  .topbar .status { font-size: 11px; color: #666; margin-left: auto; }
  .topbar .status.connected { color: #4ade80; }
  .topbar .status.disconnected { color: #f87171; }
  .topbar .status.connecting { color: #facc15; }

  /* xterm terminal container */
  #terminal {
    flex: 1;
    width: 100%;
    min-height: 0;
    background: #1a1b26;
    padding: 6px 8px 0 8px;
    overflow: hidden;
    touch-action: pan-y;
  }
  .xterm { height: 100%; }
  .xterm-viewport {
    -webkit-overflow-scrolling: touch;
    overflow-y: auto !important;
    touch-action: pan-y;
  }
  .xterm-screen { touch-action: pan-y; }

  /* Input bar - always visible at bottom */
  .inputbar {
    display: flex;
    padding: 8px 10px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    background: #24283b;
    border-top: 1px solid #1f2335;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
  }
  .inputbar .prompt-symbol {
    color: #bb9af7;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
  }
  .inputbar input {
    flex: 1;
    background: #1f2335;
    color: #c0caf5;
    border: 1px solid #414868;
    border-radius: 6px;
    padding: 12px;
    font-size: 16px;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    min-height: 44px;
  }
  .inputbar input:focus { border-color: #bb9af7; }
  .inputbar button {
    background: #bb9af7;
    color: #1a1b26;
    border: none;
    border-radius: 6px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
    min-height: 44px;
  }
  .inputbar button:active { background: #9d7cd8; }

  /* Connecting overlay */
  #connecting {
    display: none;
    position: fixed;
    inset: 0;
    background: #1a1b26;
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #connecting.show { display: flex; }
  #connecting .spinner {
    width: 32px; height: 32px;
    border: 3px solid #414868;
    border-top-color: #bb9af7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #connecting p { color: #888; font-size: 14px; }

  /* Error snackbar */
  #error-bar {
    display: none;
    background: #f7768e;
    color: #1a1b26;
    text-align: center;
    padding: 10px;
    font-size: 13px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">⚡ MAC</span>
  <span class="status connecting" id="status-indicator">Connecting...</span>
</div>

<div id="connecting" class="show">
  <div class="spinner"></div>
  <p>Connecting to your Mac...</p>
</div>

<div id="error-bar"></div>

<div id="terminal"></div>

<div class="inputbar">
  <span class="prompt-symbol">›</span>
  <input type="text" id="cmd-input" placeholder="Message Claude or run a command..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="send">
  <button id="send-btn">Send</button>
</div>

<script>
let ws = null;
let sessionId = 'claude-main';
let cmdInput = document.getElementById('cmd-input');
let statusEl = document.getElementById('status-indicator');
let connectingEl = document.getElementById('connecting');
let errorBar = document.getElementById('error-bar');
let reconnectTimer = null;
let lastToken = null;
let keepaliveTimer = null;

// --- xterm.js terminal ---
const term = new Terminal({
  cursorBlink: true,
  cursorStyle: 'bar',
  disableStdin: true,             // input flows via the bottom input bar
  scrollback: 5000,
  fontFamily: '"SF Mono","Menlo","Monaco","Courier New",monospace',
  fontSize: 13,
  lineHeight: 1.2,
  allowProposedApi: true,
  theme: {
    background: '#1a1b26',
    foreground: '#f0f0ff',
    cursor: '#bb9af7',
    cursorAccent: '#1a1b26',
    selectionBackground: '#33467c',
    black:         '#15161e',
    red:           '#ff7a93',
    green:         '#b9f27c',
    yellow:        '#ffcb6b',
    blue:          '#82aaff',
    magenta:       '#c792ea',
    cyan:          '#89ddff',
    white:         '#d6deeb',
    brightBlack:   '#5c6370',
    brightRed:     '#ff8eb3',
    brightGreen:   '#c3f78e',
    brightYellow:  '#ffd58a',
    brightBlue:    '#9cb8ff',
    brightMagenta: '#d6a6f0',
    brightCyan:    '#a5e6ff',
    brightWhite:   '#ffffff',
  }
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.loadAddon(new WebLinksAddon.WebLinksAddon());
const termContainer = document.getElementById('terminal');
term.open(termContainer);
try { fitAddon.fit(); } catch(e) {}

// --- Manual touch scrolling (xterm's native iOS scrolling is unreliable) ---
// We track finger movement and call term.scrollLines() directly so scrolling
// always works regardless of xterm's internal touch handling.
let touchActive = false;
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let touchLastY = 0;
let touchMoved = false;
let scrollVelocity = 0;
let momentumRAF = null;

function approx_line_height_px() {
  // xterm font is 13px with lineHeight 1.2 in our config; render reality may vary slightly
  return 13 * 1.2;
}

function stop_momentum() {
  if (momentumRAF) { cancelAnimationFrame(momentumRAF); momentumRAF = null; }
}

function start_momentum() {
  if (Math.abs(scrollVelocity) < 0.2) return;
  const step = () => {
    if (Math.abs(scrollVelocity) < 0.2) { momentumRAF = null; return; }
    const lines = scrollVelocity > 0 ? Math.ceil(scrollVelocity) : Math.floor(scrollVelocity);
    if (lines !== 0) term.scrollLines(lines);
    scrollVelocity *= 0.92; // friction
    momentumRAF = requestAnimationFrame(step);
  };
  momentumRAF = requestAnimationFrame(step);
}

termContainer.addEventListener('touchstart', (e) => {
  stop_momentum();
  if (e.touches.length !== 1) { touchActive = false; touchMoved = true; return; }
  const t = e.touches[0];
  touchActive = true;
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchLastY = t.clientY;
  touchStartTime = Date.now();
  touchMoved = false;
  scrollVelocity = 0;
}, { passive: true });

termContainer.addEventListener('touchmove', (e) => {
  if (!touchActive || e.touches.length !== 1) return;
  const t = e.touches[0];
  const dy = touchLastY - t.clientY;        // positive = finger up = scroll down
  const totalDx = Math.abs(t.clientX - touchStartX);
  const totalDy = Math.abs(t.clientY - touchStartY);
  if (totalDx > 6 || totalDy > 6) touchMoved = true;

  const lineHeight = approx_line_height_px();
  const linesDelta = dy / lineHeight;
  if (Math.abs(linesDelta) >= 0.5) {
    const intDelta = linesDelta > 0 ? Math.ceil(linesDelta) : Math.floor(linesDelta);
    term.scrollLines(intDelta);
    touchLastY = t.clientY;
    scrollVelocity = intDelta; // track for momentum
  }
}, { passive: true });

termContainer.addEventListener('touchend', () => {
  if (!touchActive) return;
  touchActive = false;
  const elapsed = Date.now() - touchStartTime;

  // Tap (no significant movement, short hold) → focus the input bar
  if (!touchMoved && elapsed < 400) {
    if (!(window.getSelection && window.getSelection().toString().length > 0)) {
      cmdInput.focus();
    }
    return;
  }

  // Otherwise it was a scroll gesture → apply momentum
  start_momentum();
});

termContainer.addEventListener('touchcancel', () => {
  touchActive = false;
  stop_momentum();
});

// Desktop wheel scroll (for testing in browser on Mac)
termContainer.addEventListener('wheel', (e) => {
  const lineHeight = approx_line_height_px();
  const lines = Math.round(e.deltaY / lineHeight);
  if (lines !== 0) {
    term.scrollLines(lines);
    e.preventDefault();
  }
}, { passive: false });

// Desktop click — focus input bar if no text is selected
termContainer.addEventListener('click', (e) => {
  if (window.getSelection && window.getSelection().toString().length > 0) return;
  if (document.activeElement === cmdInput) return;
  cmdInput.focus();
});

// --- Persistent scrollback (raw byte stream replay) ---
const SCROLLBACK_KEY = 'claude-terminal-stream-' + sessionId;
const MAX_SCROLLBACK = 200000; // ~200KB of raw bytes (incl. ANSI codes)
let streamBuffer = '';

function load_scrollback() {
  try {
    const saved = localStorage.getItem(SCROLLBACK_KEY);
    if (saved) {
      streamBuffer = saved;
      term.write(saved);
    }
  } catch(e) {}
}

let save_timer = null;
function schedule_save() {
  if (save_timer) return;
  save_timer = setTimeout(() => {
    save_timer = null;
    try {
      if (streamBuffer.length > MAX_SCROLLBACK) {
        streamBuffer = streamBuffer.slice(streamBuffer.length - MAX_SCROLLBACK);
      }
      localStorage.setItem(SCROLLBACK_KEY, streamBuffer);
    } catch(e) {}
  }, 600);
}

function write_to_terminal(data) {
  term.write(data);
  streamBuffer += data;
  schedule_save();
}

function send_resize() {
  try {
    const { cols, rows } = term;
    if (ws && ws.readyState === WebSocket.OPEN && cols && rows) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  } catch(e) {}
}

function fit_and_resize() {
  try { fitAddon.fit(); } catch(e) {}
  send_resize();
}

window.addEventListener('resize', fit_and_resize);

function boot() {
  load_scrollback();
  fit_and_resize();
  fetch('/api/config').then(r => r.json()).then(cfg => {
    connect(cfg.token);
  }).catch(() => {
    connect('claude123');
  });
}

function connect(token) {
  lastToken = token;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${protocol}//${location.host}/ws/${sessionId}?token=${token}`;

  connectingEl.classList.add('show');
  set_status('connecting', 'Connecting...');
  errorBar.style.display = 'none';

  ws = new WebSocket(url);

  ws.onopen = () => {
    connectingEl.classList.remove('show');
    set_status('connected', 'Connected');
    errorBar.style.display = 'none';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (keepaliveTimer) clearInterval(keepaliveTimer);
    keepaliveTimer = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        try { ws.send(JSON.stringify({ type: 'ping' })); } catch(e) {}
      }
    }, 25000);
    // Send terminal size so the PTY renders correctly
    setTimeout(fit_and_resize, 50);
    cmdInput.focus();
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'output') {
        write_to_terminal(msg.data);
      }
    } catch(e) {
      write_to_terminal(event.data);
    }
  };

  ws.onclose = () => {
    set_status('disconnected', 'Disconnected');
    connectingEl.classList.remove('show');
    if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
    if (!reconnectTimer) {
      reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(token); }, 3000);
    }
  };

  ws.onerror = () => {
    set_status('disconnected', 'Error');
    connectingEl.classList.remove('show');
    errorBar.textContent = 'Connection failed. Retrying...';
    errorBar.style.display = 'block';
    if (!reconnectTimer) {
      reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(token); }, 3000);
    }
  };
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && lastToken) {
    fit_and_resize();
    if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      connect(lastToken);
    }
  }
});

window.addEventListener('online', () => {
  if (lastToken && (!ws || ws.readyState !== WebSocket.OPEN)) {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    connect(lastToken);
  }
});

function send_command() {
  const text = cmdInput.value;
  if (text === '' || !ws || ws.readyState !== WebSocket.OPEN) return;

  // Echo the user's input locally with a distinct colored block + bright cyan text
  // so it visually pops out from Claude's output (which uses its own palette).
  //  \x1b[48;5;39;38;5;231;1m = bright cyan background + white fg + bold for the badge
  //  \x1b[1;96m = bold + bright cyan for the message itself
  write_to_terminal(
    `\r\n\x1b[48;5;39;38;5;231;1m YOU \x1b[0m \x1b[1;96m${text}\x1b[0m\r\n`
  );

  ws.send(JSON.stringify({ type: 'input', data: text }));
  ws.send(JSON.stringify({ type: 'enter' }));
  cmdInput.value = '';
}

function clear_scrollback() {
  streamBuffer = '';
  term.clear();
  try { localStorage.removeItem(SCROLLBACK_KEY); } catch(e) {}
}

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    send_command();
  }
});

document.getElementById('send-btn').addEventListener('click', send_command);

function set_status(s, text) {
  statusEl.textContent = text;
  statusEl.className = 'status ' + s;
}

cmdInput.addEventListener('focus', () => {
  setTimeout(() => {
    cmdInput.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    fit_and_resize();
  }, 300);
});

// Boot
boot();
</script>
</body>
</html>
