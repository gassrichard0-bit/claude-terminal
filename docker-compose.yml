services:
  claude-terminal:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CLAUDE_TERMINAL_TOKEN=dev-token-change-me
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    # Run the app with auto-reload in dev
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8080 --reload --ws-ping-interval 30 --ws-ping-timeout 10
